name: Scheduled AI Question Generation Workflow

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "20" }
      - name: Install dependencies
        run: npm install

      - name: Run script
        working-directory: ./src/scripts
        run: npx ts-node  question-generation.ts
        env:
          GOOGLE_AI_STUDIO_API_KEY: ${{ secrets.GOOGLE_AI_STUDIO_API_KEY }}
          QUIZ_API_ENDPOINT: ${{ secrets.QUIZ_API_ENDPOINT }}
